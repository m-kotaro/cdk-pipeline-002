AWSTemplateFormatVersion: "2010-09-09"
Description: SSM Parameter Store for account configuration

Parameters:
  ProjectName:
    Type: String
    Default: cp002
  Env:
    Type: String
    Description: "Environment code (e.g. dev, stg, prd)"
  PipelineAccountId:
    Type: String
    Description: "Pipeline Account ID (account where CDK Pipelines is deployed)"
  TargetAccountId:
    Type: String
    Description: "Target Account ID (account where resources are deployed)"

Resources:
  PipelineAccountIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ProjectName}/${Env}/pipeline-account-id
      Type: String
      Value: !Ref PipelineAccountId
      Description: !Sub "Pipeline account ID for ${Env} environment"

  TargetAccountIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ProjectName}/${Env}/target-account-id
      Type: String
      Value: !Ref TargetAccountId
      Description: !Sub "Target account ID for ${Env} environment"

Outputs:
  PipelineAccountIdParameterName:
    Description: Pipeline Account ID parameter name
    Value: !Ref PipelineAccountIdParameter
  TargetAccountIdParameterName:
    Description: Target Account ID parameter name
    Value: !Ref TargetAccountIdParameter
