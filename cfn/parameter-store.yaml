AWSTemplateFormatVersion: "2010-09-09"
Description: SSM Parameter Store for target account configuration

Parameters:
  ProjectName:
    Type: String
    Default: cp002
  Env:
    Type: String
    AllowedValues:
      - dev
      - prd
  TargetAccountId:
    Type: String
  TargetRegion:
    Type: String
    Default: ap-northeast-1

Resources:
  AccountIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ProjectName}/${Env}/account-id
      Type: String
      Value: !Ref TargetAccountId
      Description: !Sub "Target account ID for ${Env} environment"

  RegionParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ProjectName}/${Env}/region
      Type: String
      Value: !Ref TargetRegion
      Description: !Sub "Target region for ${Env} environment"

Outputs:
  AccountIdParameterName:
    Description: Account ID parameter name
    Value: !Ref AccountIdParameter
  RegionParameterName:
    Description: Region parameter name
    Value: !Ref RegionParameter
